
[package]
name = "swap"
edition = "2024.beta"

[dependencies]
# Dépendances Sui - utiliser la même révision que deepbook pour éviter les conflits
# Révision utilisée par deepbook: 9a4d4016ba66c646c76c4b8d54fa9e767f240ab1
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "9a4d4016ba66c646c76c4b8d54fa9e767f240ab1", override = true }

# Dépendances externes
deepbook = { git = "https://github.com/MystenLabs/deepbookv3.git", subdir = "packages/deepbook", rev = "main" }
TurbosCLMM = { git = "https://github.com/turbos-finance/turbos-sui-move-interface.git", subdir = "clmm", rev = "main", override = true }

[addresses]
swap = "0x0"
# deepbook address is defined in the deepbookv3 package itself
